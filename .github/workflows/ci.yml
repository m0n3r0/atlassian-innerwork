name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - name: Install Python
        run: uv python install 3.11
      - name: Install dependencies
        run: uv sync --dev --frozen
      - name: Lint
        run: uv run ruff check .
      - name: Type check
        run: uv run pyright
      - name: Validate OpenAPI contract
        run: uv run python scripts/validate_openapi_contract.py
      - name: Test
        run: uv run pytest -q
      - name: Build wheel
        run: uv build --wheel
