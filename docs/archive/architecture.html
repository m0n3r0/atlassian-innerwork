<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Atlassian Innerwork Architecture</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #08111f;
      --panel: #101f33;
      --panel2: #132a46;
      --stroke: #2d5f96;
      --accent: #4f8cff;
      --green: #36d399;
      --yellow: #fbbf24;
      --red: #fb7185;
      --text: #e7f0ff;
      --muted: #9fb3c8;
    }
    body {
      margin: 0;
      background: radial-gradient(circle at top left, #123b63 0, var(--bg) 42%, #050914 100%);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
    }
    main { max-width: 1320px; margin: 0 auto; padding: 28px; }
    h1 { margin: 0 0 8px; font-size: 30px; letter-spacing: -0.04em; }
    p { color: var(--muted); line-height: 1.55; }
    .wrap { overflow-x: auto; border: 1px solid #244263; border-radius: 18px; background: rgba(8,17,31,0.72); box-shadow: 0 24px 80px rgba(0,0,0,0.35); }
    svg { min-width: 1240px; display: block; }
    .label { fill: var(--text); font-size: 14px; font-weight: 700; }
    .small { fill: var(--muted); font-size: 11px; }
    .tiny { fill: var(--muted); font-size: 10px; }
    .box { fill: var(--panel); stroke: var(--stroke); stroke-width: 1.2; rx: 14; }
    .box2 { fill: var(--panel2); stroke: var(--stroke); stroke-width: 1.2; rx: 14; }
    .product { fill: #0f2947; stroke: #3b82f6; stroke-width: 1; rx: 10; }
    .platform { fill: #102a2a; stroke: #36d399; stroke-width: 1; rx: 10; }
    .edge { fill: #2b2138; stroke: #a78bfa; stroke-width: 1; rx: 10; }
    .warn { fill: #33290c; stroke: #fbbf24; stroke-width: 1; rx: 10; }
    .arrow { stroke: #8db7e8; stroke-width: 2; marker-end: url(#arrow); fill: none; opacity: .88; }
    .soft { stroke: #3c5e83; stroke-width: 1.4; fill: none; opacity: .75; }
  </style>
</head>
<body>
<main>
  <h1>Atlassian Innerwork: Product Suite + Platform + Edge</h1>
  <p>Clean-room architecture map from the public video and Atlassian software homepage. It shows how products sit on shared system-of-work services and a self-service edge/control-plane foundation.</p>
  <div class="wrap">
  <svg width="1240" height="1160" viewBox="0 0 1240 1160" role="img" aria-label="Atlassian Innerwork architecture diagram">
    <defs>
      <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#8db7e8" />
      </marker>
      <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000" flood-opacity="0.35"/>
      </filter>
    </defs>

    <rect x="28" y="24" width="1184" height="1108" class="box" filter="url(#shadow)" />
    <text x="58" y="62" class="label" font-size="18">Customers, teams, leaders, developers, IT, ecosystem integrations</text>
    <text x="58" y="84" class="small">The public product surface is one system of work, not isolated apps.</text>

    <rect x="58" y="112" width="1124" height="248" class="box2" />
    <text x="82" y="142" class="label">Product experiences and collections</text>

    <rect x="82" y="166" width="190" height="70" class="product" />
    <text x="100" y="192" class="label">Teamwork</text>
    <text x="100" y="214" class="small">Jira · Confluence · Loom</text>
    <text x="100" y="232" class="small">Trello · Rovo</text>

    <rect x="292" y="166" width="190" height="70" class="product" />
    <text x="310" y="192" class="label">Software</text>
    <text x="310" y="214" class="small">Bitbucket · Pipelines</text>
    <text x="310" y="232" class="small">Rovo Dev · DX</text>

    <rect x="502" y="166" width="190" height="70" class="product" />
    <text x="520" y="192" class="label">Service</text>
    <text x="520" y="214" class="small">JSM · CSM · Assets</text>
    <text x="520" y="232" class="small">Statuspage · Guard</text>

    <rect x="712" y="166" width="190" height="70" class="product" />
    <text x="730" y="192" class="label">Product</text>
    <text x="730" y="214" class="small">Jira Product Discovery</text>
    <text x="730" y="232" class="small">Feedback · Rovo</text>

    <rect x="922" y="166" width="220" height="70" class="product" />
    <text x="940" y="192" class="label">Strategy</text>
    <text x="940" y="214" class="small">Focus · Talent</text>
    <text x="940" y="232" class="small">Jira Align / Align</text>

    <rect x="82" y="262" width="250" height="64" class="product" />
    <text x="100" y="289" class="label">Ecosystem</text>
    <text x="100" y="310" class="small">Marketplace · Community · Partners · Dev resources</text>

    <rect x="352" y="262" width="250" height="64" class="product" />
    <text x="370" y="289" class="label">Companion developer tools</text>
    <text x="370" y="310" class="small">Bamboo · SourceTree</text>

    <rect x="622" y="262" width="520" height="64" class="warn" />
    <text x="640" y="289" class="label">Product-specific edge profiles</text>
    <text x="640" y="310" class="small">web · media · git · CI/CD · service portal · public status · AI agent · admin/security</text>

    <path d="M620 360 L620 396" class="arrow" />

    <rect x="58" y="396" width="1124" height="170" class="box2" />
    <text x="82" y="426" class="label">Atlassian Cloud Platform foundation</text>

    <g>
      <rect x="82" y="450" width="112" height="46" class="platform" /><text x="112" y="479" class="label">Home</text>
      <rect x="214" y="450" width="112" height="46" class="platform" /><text x="244" y="479" class="label">Goals</text>
      <rect x="346" y="450" width="112" height="46" class="platform" /><text x="376" y="479" class="label">Teams</text>
      <rect x="478" y="450" width="112" height="46" class="platform" /><text x="508" y="479" class="label">Studio</text>
      <rect x="610" y="450" width="112" height="46" class="platform" /><text x="638" y="479" class="label">Search</text>
      <rect x="742" y="450" width="112" height="46" class="platform" /><text x="775" y="479" class="label">Chat</text>
      <rect x="874" y="450" width="112" height="46" class="platform" /><text x="898" y="479" class="label">Analytics</text>
      <rect x="1006" y="450" width="112" height="46" class="platform" /><text x="1038" y="479" class="label">Admin</text>
    </g>
    <text x="82" y="532" class="small">Shared platform APIs provide identity, permissions, object links, search, AI context, reporting, admin policy, and marketplace extension controls.</text>

    <path d="M620 566 L620 600" class="arrow" />

    <rect x="58" y="600" width="1124" height="116" class="box2" />
    <text x="82" y="630" class="label">Cross-product graphs</text>
    <text x="82" y="660" class="small">Work graph · Knowledge graph · Team graph · Delivery graph · Service graph · Asset graph · Feedback graph · Strategy graph</text>
    <text x="82" y="686" class="small">Rovo, Search, Analytics, Admin, and product integrations traverse these graphs with source-product permission checks.</text>

    <path d="M620 716 L620 752" class="arrow" />

    <rect x="58" y="752" width="1124" height="176" class="box2" />
    <text x="82" y="782" class="label">Self-service edge platform from the video</text>

    <rect x="82" y="810" width="150" height="58" class="edge" /><text x="106" y="837" class="label">Broker API</text><text x="102" y="855" class="tiny">OSB-style lifecycle</text>
    <path d="M232 839 L270 839" class="arrow" />
    <rect x="270" y="810" width="150" height="58" class="edge" /><text x="310" y="837" class="label">Workers</text><text x="295" y="855" class="tiny">queue + retries</text>
    <path d="M420 839 L458 839" class="arrow" />
    <rect x="458" y="810" width="150" height="58" class="edge" /><text x="492" y="837" class="label">Durable state</text><text x="480" y="855" class="tiny">services/routes/ops</text>
    <path d="M608 839 L646 839" class="arrow" />
    <rect x="646" y="810" width="150" height="58" class="edge" /><text x="676" y="837" class="label">xDS renderer</text><text x="674" y="855" class="tiny">deterministic snapshots</text>
    <path d="M796 839 L834 839" class="arrow" />
    <rect x="834" y="810" width="150" height="58" class="edge" /><text x="868" y="837" class="label">Rollout</text><text x="858" y="855" class="tiny">canary + rollback</text>
    <path d="M984 839 L1022 839" class="arrow" />
    <rect x="1022" y="810" width="132" height="58" class="edge" /><text x="1052" y="837" class="label">Audit</text><text x="1046" y="855" class="tiny">evidence trail</text>

    <text x="82" y="900" class="small">Input is developer/product intent, not raw Envoy configuration. Policies validate ownership, product profile, domains, routes, and controls before render.</text>

    <path d="M620 928 L620 964" class="arrow" />

    <rect x="58" y="964" width="1124" height="126" class="box2" />
    <text x="82" y="994" class="label">Regional edge data plane</text>
    <rect x="82" y="1022" width="180" height="48" class="edge" /><text x="116" y="1052" class="label">CDN / NLB</text>
    <path d="M262 1046 L304 1046" class="arrow" />
    <rect x="304" y="1022" width="180" height="48" class="edge" /><text x="350" y="1052" class="label">Envoy fleet</text>
    <path d="M484 1046 L526 1046" class="arrow" />
    <rect x="526" y="1022" width="250" height="48" class="edge" /><text x="552" y="1052" class="label">Auth · authz · rate-limit · policy</text>
    <path d="M776 1046 L818 1046" class="arrow" />
    <rect x="818" y="1022" width="150" height="48" class="edge" /><text x="860" y="1052" class="label">Backends</text>
    <path d="M968 1046 L1010 1046" class="arrow" />
    <rect x="1010" y="1022" width="144" height="48" class="edge" /><text x="1042" y="1052" class="label">Telemetry</text>

    <text x="82" y="1110" class="small">Safety invariants: deny unknown hosts, fail closed for auth, mandatory logs, deterministic snapshots, canary rollout, last-known-good on failure.</text>
  </svg>
  </div>
</main>
</body>
</html>
